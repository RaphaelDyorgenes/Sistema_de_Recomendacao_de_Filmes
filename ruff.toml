target-version = "py311"
line-length = 88
src = ["src", "tests"]

[lint]
select = [
    "E", "W",   # pycodestyle
    "F",        # pyflakes
    "I",        # isort
    "N",        # pep8-naming
    "D",        # pydocstyle
    "ANN",      # flake8-annotations
    "UP",       # pyupgrade
    "B",        # flake8-bugbear
    "C90",      # mccabe
    "SIM",      # flake8-simplify
]

ignore = [
    "D107",  # __init__ de classe não precisa de docstring
]

[lint.pydocstyle]
convention = "google"

[lint.mccabe]
max-complexity = 10

[lint.per-file-ignores]
"tests/**" = ["D", "ANN"]
"**/__init__.py" = ["D104"]

[format]
docstring-code-format = true
