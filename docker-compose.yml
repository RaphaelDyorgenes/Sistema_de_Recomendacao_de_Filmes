services:
  mlflow-server:
    image: python:3.11-slim
    container_name: mlflow-server
    command: >
      bash -c "pip install --no-cache-dir mlflow && mlflow server --backend-store-uri sqlite:///mlflow/mlflow.db --default-artifact-root /mlflow/artifacts --host 0.0.0.0 --port 5000 --allowed-hosts '*'"
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recsys-pipeline
    depends_on:
      mlflow-server:
        condition: service_healthy
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
      - MLFLOW_EXPERIMENT_NAME=recsys-movielens
      - DATA_SAMPLE_SIZE=100000
      - RANDOM_SEED=42
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: ["recsys.training.train"]

volumes:
  mlflow-data:
